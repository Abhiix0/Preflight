services:
  frontend:
    container_name: preflight-frontend
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - preflight-network

  backend:
    container_name: preflight-backend
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - preflight-network

  worker:
    container_name: preflight-worker
    build:
      context: ./backend
    command: uv run celery -A app.workers.celery_app worker --loglevel=info
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - preflight-network

  postgres:
    container_name: preflight-postgres
    image: postgres:17-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - preflight-network

  redis:
    container_name: preflight-redis
    image: redis:8-alpine
    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - preflight-network

  minio:
    container_name: preflight-minio
    image: minio/minio:latest
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

    networks:
      - preflight-network

volumes:
  postgres_data:
  minio_data:

networks:
  preflight-network:
    driver: bridge